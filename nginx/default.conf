upstream shlink_api {
    server api:8080;
}

upstream shlink_web {
    server web:8080;
}

server {
    listen 80;
    server_name localhost;

    # ----------------------------------------
    # API Routes - /rest/* dhe /api/*
    # ----------------------------------------
    location /rest/ {
        proxy_pass http://shlink_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'X-Api-Key, Content-Type' always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ----------------------------------------
    # Health check
    # ----------------------------------------
    location /health {
        proxy_pass http://shlink_api/rest/health;
        proxy_set_header Host $host;
    }

    # ----------------------------------------
    # Web Client UI - /app/*
    # ----------------------------------------
    location /app/ {
        proxy_pass http://shlink_web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ----------------------------------------
    # Short URL redirect - te gjitha URL-te e shkurtra
    # Shlink do i trajtoje vete
    # ----------------------------------------
    location / {
        proxy_pass http://shlink_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
